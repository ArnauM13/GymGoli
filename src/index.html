<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="icon" type="image/png" href="assets/bibis.png">
  <link rel="apple-touch-icon" href="assets/bibis.png">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://app-gym-two.vercel.app/">
  <meta property="og:title"       content="GymGoli — El teu registre d'entrenaments">
  <meta property="og:description" content="Gym, esports, cardio — tot en un sol lloc. Registra les teves sessions en segons i consulta el teu historial quan vulguis.">

  <!-- Twitter / X -->
  <meta name="twitter:card"        content="summary">

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="mat-typography">
  <app-root></app-root>
  <div id="app-loader">
    <img src="assets/bibis.png" class="al-logo" alt="GymGoli">
  </div>
  <style>
    #app-loader {
      position: fixed; inset: 0;
      background: #ffffff;
      display: flex;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #app-loader.hiding { opacity: 0; pointer-events: none; }
    .al-logo {
      width: 76px; height: 76px;
      border-radius: 22px;
      box-shadow: 0 4px 20px rgba(0,104,116,0.18);
      animation: al-pulse 1.8s ease-in-out infinite;
    }
    @keyframes al-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(0.93); }
    }
  </style>
</body>
</html>
