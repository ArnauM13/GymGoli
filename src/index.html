<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <title>GymGoli</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#006874">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" type="image/png" href="assets/bibis.png">
  <link rel="apple-touch-icon" href="assets/bibis.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
</head>
<body class="mat-typography">
  <app-root></app-root>
  <div id="app-loader">
    <img src="assets/bibis.png" class="al-logo" alt="GymGoli">
    <div class="al-spinner"></div>
  </div>
  <style>
    #app-loader {
      position: fixed; inset: 0;
      background: #ffffff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; z-index: 9999;
      transition: opacity 0.45s ease;
    }
    #app-loader.hiding { opacity: 0; pointer-events: none; }
    .al-logo {
      width: 76px; height: 76px;
      border-radius: 22px;
      box-shadow: 0 4px 20px rgba(0,104,116,0.18);
    }
    .al-spinner {
      width: 28px; height: 28px;
      border: 3px solid #e8f4f5;
      border-top-color: #006874;
      border-radius: 50%;
      animation: al-spin 0.75s linear infinite;
    }
    @keyframes al-spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
